<svg viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <rect width="256" height="256" rx="40" fill="#1a1f25"/>

  <g transform="translate(128 128)">
    <!-- Outer lens body (dark, with bright edge for definition) -->
    <circle cx="0" cy="0" r="86"
            fill="#0a0d10"
            stroke="#cfeae5" stroke-width="3"/>

    <!-- Inner ring -->
    <circle cx="0" cy="0" r="64"
            fill="none" stroke="#82c4ae" stroke-width="2"/>

    <!-- Aperture / iris -->
    <circle cx="0" cy="0" r="34" fill="#34ae9e"/>
    <circle cx="0" cy="0" r="34" fill="none"
            stroke="#cfeae5" stroke-width="2"/>

    <!-- Specular highlight on the iris — that "real camera lens" hint -->
    <circle cx="-12" cy="-12" r="8" fill="#cfeae5" opacity="0.55"/>

    <!-- Crosshair: four short ticks outside the lens body, suggesting
         a reticle locked onto the subject -->
    <g stroke="#cfeae5" stroke-width="2.5" stroke-linecap="round">
      <line x1="-114" y1="0" x2="-94" y2="0"/>
      <line x1="94"  y1="0" x2="114" y2="0"/>
      <line x1="0" y1="-114" x2="0" y2="-94"/>
      <line x1="0" y1="94"  x2="0" y2="114"/>
    </g>
  </g>
</svg>
